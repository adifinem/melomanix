name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev \
            libfontconfig1-dev libfreetype-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxrender-dev libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DMELOMANIX_COPY_PLUGIN=OFF

      - name: Build VST3
        run: cmake --build build --config Release --target Melomanix_VST3

      - name: Run engine tests
        if: runner.os == 'Linux'
        run: |
          cmake --build build --config Release --target MelomanixTests
          ./build/MelomanixTests_artefacts/Release/MelomanixTests

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melomanix-VST3-${{ matrix.name }}
          path: build/Melomanix_artefacts/**/VST3/Melomanix.vst3
